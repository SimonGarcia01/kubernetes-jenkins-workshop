apiVersion: v1
kind: Pod
metadata:
  name: devops-workshop
spec:
  containers:
    - name: jenkins
      image: jenkins/jenkins:lts
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

  volumes:
    - name: jenkins-home
      emptyDir: {}
